name: auto check

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'imgs/'
  schedule:
    - cron: '1 0,16 * * *'
  watch:
    types: started

jobs:
  build:
    name: glados checkin
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8]

    steps:
    - uses: actions/checkout@v4

    - name: set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    # 安装 python 库
    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pypushdeer

    # 执行 签到脚本
    - name: running checkin (two accounts)
      shell: bash
      run: |
        set -e

        for idx in 1 2; do
          echo "===== Checkin account ${idx} ====="
          GLADOS_COOKIES="$(printenv GLADOS_COOKIES_${idx})" \
          GLADOS_EXCHANGE_PLAN="$(printenv GLADOS_EXCHANGE_PLAN_${idx})" \
          python checkin.py
        done
      env:
        PUSHDEER_SENDKEY: ${{ secrets.PUSHDEER_SENDKEY }}
        GLADOS_COOKIES_1: ${{ secrets.GLADOS_COOKIES_1 }}
        GLADOS_COOKIES_2: ${{ secrets.GLADOS_COOKIES_2 }}
        GLADOS_EXCHANGE_PLAN_1: ${{ secrets.GLADOS_EXCHANGE_PLAN_1 }}
        GLADOS_EXCHANGE_PLAN_2: ${{ secrets.GLADOS_EXCHANGE_PLAN_2 }}

    - name: keep alive
      uses: liskin/gh-workflow-keepalive@v1 # using the workflow with default settings
      
    - name: delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 7
        keep_minimum_runs: 10
        delete_run_by_conclusion_pattern: success
 
